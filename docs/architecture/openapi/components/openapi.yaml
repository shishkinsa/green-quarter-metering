openapi: 3.0.3
info:
  title: Зеленый квартал — Учёт электроэнергии API
  version: 0.6.0
  description: Канонический REST-контракт. Обновляйте синхронно с кодом WebAPI и клиента.

servers:
  - url: /api/v1
    description: Внутренний API v1

paths:
  /health:
    get:
      operationId: getHealth
      summary: Проверка готовности сервиса
      tags: [System]
      responses:
        '200':
          description: Сервис доступен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /buildings:
    get:
      operationId: listBuildings
      summary: Список домов
      tags: [Directories]
      responses:
        '200':
          description: Список домов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListBuildingsResponse'
    post:
      operationId: createBuilding
      summary: Создать дом
      tags: [Directories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBuildingRequest'
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBuildingResponse'
        '400':
          description: Ошибка валидации

  /buildings/{buildingId}:
    put:
      operationId: updateBuilding
      summary: Обновить дом
      tags: [Directories]
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBuildingRequest'
      responses:
        '200':
          description: Обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateBuildingResponse'
        '400':
          description: Ошибка валидации
        '404':
          description: Не найдено

  /buildings/{buildingId}/apartments:
    get:
      operationId: listApartmentsWithOwners
      summary: Квартиры дома с владельцами
      tags: [Directories]
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Список квартир
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListApartmentsWithOwnersResponse'
        '404':
          description: Дом не найден
    post:
      operationId: createApartment
      summary: Создать квартиру в доме
      tags: [Directories]
      parameters:
        - name: buildingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApartmentRequest'
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApartmentResponse'
        '400':
          description: Ошибка валидации
        '404':
          description: Дом не найден
        '409':
          description: Дубликат номера квартиры

  /apartments/{apartmentId}/owner:
    put:
      operationId: upsertApartmentOwner
      summary: Назначить или обновить владельца квартиры
      tags: [Directories]
      parameters:
        - name: apartmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertApartmentOwnerRequest'
      responses:
        '200':
          description: Сохранено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertApartmentOwnerResponse'
        '400':
          description: Ошибка валидации
        '404':
          description: Квартира не найдена

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: GQ.WebApi.WebApp

    BuildingDto:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 256
        address:
          type: string
          maxLength: 512
          nullable: true

    ApartmentWithOwnerDto:
      type: object
      required: [id, buildingId, number]
      properties:
        id:
          type: string
          format: uuid
        buildingId:
          type: string
          format: uuid
        number:
          type: string
          maxLength: 32
        floor:
          type: integer
          nullable: true
        ownerId:
          type: string
          format: uuid
          nullable: true
        ownerFullName:
          type: string
          maxLength: 256
          nullable: true
        ownerPhone:
          type: string
          maxLength: 32
          nullable: true

    OwnerDto:
      type: object
      required: [id, apartmentId, fullName]
      properties:
        id:
          type: string
          format: uuid
        apartmentId:
          type: string
          format: uuid
        fullName:
          type: string
          maxLength: 256
        phone:
          type: string
          maxLength: 32
          nullable: true

    CreateBuildingRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 256
        address:
          type: string
          maxLength: 512
          nullable: true

    CreateBuildingResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/BuildingDto'

    UpdateBuildingRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 256
        address:
          type: string
          maxLength: 512
          nullable: true

    UpdateBuildingResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/BuildingDto'

    ListBuildingsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BuildingDto'

    CreateApartmentRequest:
      type: object
      required: [number]
      properties:
        number:
          type: string
          maxLength: 32
        floor:
          type: integer
          nullable: true

    CreateApartmentResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/ApartmentWithOwnerDto'

    ListApartmentsWithOwnersResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApartmentWithOwnerDto'

    UpsertApartmentOwnerRequest:
      type: object
      required: [fullName]
      properties:
        fullName:
          type: string
          maxLength: 256
        phone:
          type: string
          maxLength: 32
          nullable: true

    UpsertApartmentOwnerResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/OwnerDto'
