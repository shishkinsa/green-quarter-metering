name: green-quarter-metering

services:
  postgres:
    image: postgres:16-alpine
    container_name: gq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cnt_gq_db
      POSTGRES_USER: cnt_gq_db_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe_StrongPassword_123!}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gq_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnt_gq_db_user -d cnt_gq_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./src
      dockerfile: ./webapi/cnt_gq_webapi/6 WebApp/Dockerfile
    container_name: gq-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=cnt_gq_db;Username=cnt_gq_db_user;Password=${POSTGRES_PASSWORD:-ChangeMe_StrongPassword_123!}"
      Database__AutoMigrate: ${DATABASE_AUTO_MIGRATE:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4317}
    ports:
      - "${BACKEND_PORT:-5025}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./src/frontend/cnt_gq_web
      dockerfile: Dockerfile
    container_name: gq-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  gq_pg_data:

networks:
  default:
    name: gq_app_network
